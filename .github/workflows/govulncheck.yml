name: Vulncheck

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 9 * * 1" # weekly, to catch newly-disclosed CVEs in deps

jobs:
  govulncheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      # Install + run govulncheck directly instead of golang/govulncheck-action,
      # whose internal git checkout was failing in CI with "unable to access … 400"
      # (git exit 128) on every run. This direct invocation is what we run locally
      # and only fails the build when a vulnerability actually reaches our code.
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: Run govulncheck
        run: govulncheck ./...
