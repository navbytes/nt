name: Release

# Push a semver tag to cut a release: GoReleaser builds the cross-platform
# binaries + checksums, creates the GitHub Release, and updates the Homebrew tap.
on:
  push:
    tags: ["v*"]
  # Manual release valve: when a tag can't be pushed directly (e.g. from a
  # restricted/sandboxed clone where `git push origin <tag>` is blocked),
  # dispatch this workflow with the version. The goreleaser job creates and
  # pushes the annotated tag itself — from inside CI, where the token may push
  # refs — before building, so the exact same pipeline runs either way.
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to create (e.g. v0.15.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # full history so GoReleaser can build the changelog
      # On manual dispatch, mint the tag here (the default token may push refs
      # inside Actions) so GoReleaser sees a tagged HEAD. A tag pushed with the
      # default GITHUB_TOKEN does not re-trigger this workflow, so there's no
      # double release — this same run carries the build through.
      - name: Create and push tag (manual dispatch)
        if: github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ inputs.tag }}" -m "nt ${{ inputs.tag }}"
          git push origin "${{ inputs.tag }}"
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: internal/web/frontend/package-lock.json
      - uses: goreleaser/goreleaser-action@v7
        with:
          version: "~> v2"
          args: release --clean
        env:
          # Creates the GitHub Release (binaries + checksums) on this repo.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # When you enable the Homebrew tap later (RELEASING.md), also set:
          # HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}

  # Native desktop bundles (Wails) for the /desktop module. Runs AFTER the
  # GoReleaser job so it uploads into the Release that job already created — no
  # race over who creates the Release. A failure here never unpublishes the CLI
  # release (already done). macOS signing+notarization is gated on secrets being
  # present; without them the macOS app is uploaded ad-hoc-signed (users then
  # right-click → Open once). See desktop/RELEASING.md for the secret setup.
  desktop:
    needs: goreleaser
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            label: macos_universal
            platform: darwin/universal
            tags: production
          - os: ubuntu-latest
            label: linux_amd64
            platform: linux/amd64
            tags: production webkit2_41
          - os: windows-latest
            label: windows_amd64
            platform: windows/amd64
            tags: production
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: desktop
    env:
      # Job-level env may reference secrets; steps gate on these being non-empty.
      APPLE_DEVELOPER_ID: ${{ secrets.APPLE_DEVELOPER_ID }}
      APPLE_CERT_P12: ${{ secrets.APPLE_CERT_P12 }}
      APPLE_CERT_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APPLE_NOTARY_PASSWORD: ${{ secrets.APPLE_NOTARY_PASSWORD }}
    steps:
      # Build the tagged commit in both trigger modes: on a tag push that's
      # GITHUB_REF; on manual dispatch it's the tag the goreleaser job just
      # created (this job `needs` it, so the tag already exists on the remote).
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - uses: actions/setup-go@v6
        with:
          go-version-file: desktop/go.mod
          cache: true
          cache-dependency-path: desktop/go.sum

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: internal/web/frontend/package-lock.json

      - name: Compute version
        shell: bash
        # On a tag push the ref name IS the tag; on dispatch take it from the
        # input. RELEASE_TAG is what `gh release upload` targets below.
        run: |
          REF="${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}"
          echo "VER=${REF#v}" >> "$GITHUB_ENV"
          echo "RELEASE_TAG=${REF}" >> "$GITHUB_ENV"

      - name: Install Linux WebKit/GTK deps
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Install Wails CLI
        shell: bash
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Stamp version into wails.json
        shell: bash
        run: |
          node -e "const fs=require('fs');const p='wails.json';const j=JSON.parse(fs.readFileSync(p,'utf8'));j.info.productVersion=process.argv[1]||'0.0.0';fs.writeFileSync(p,JSON.stringify(j,null,2)+'\n')" "$VER"

      - name: Build web SPA (embedded by the desktop app via internal/web)
        shell: bash
        # The desktop window serves the same Svelte SPA as `nt web` (desktop/main.go
        # → web.NewServer), embedded via //go:embed. The bundle isn't committed, so
        # build it before wails compiles the Go binary, or the app ships no UI.
        # This job runs in desktop/, so target the SPA via an absolute path.
        run: |
          npm --prefix "$GITHUB_WORKSPACE/internal/web/frontend" ci
          npm --prefix "$GITHUB_WORKSPACE/internal/web/frontend" run build

      - name: Build app
        shell: bash
        # -ldflags injects the release version into the Go binary (main.version)
        # so the in-app About panel matches `nt --version`; the wails.json stamp
        # above covers the bundle/Finder version.
        run: wails build -tags "${{ matrix.tags }}" -platform ${{ matrix.platform }} -s -ldflags "-X main.version=${VER}"

      # --- macOS: sign + notarize (only when signing secrets are configured) ---
      - name: Import signing certificate
        if: matrix.os == 'macos-latest' && env.APPLE_CERT_P12 != ''
        shell: bash
        run: |
          KEYCHAIN="$RUNNER_TEMP/app.keychain-db"
          KPASS="$(openssl rand -base64 16)"
          security create-keychain -p "$KPASS" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KPASS" "$KEYCHAIN"
          echo "$APPLE_CERT_P12" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" -P "$APPLE_CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KPASS" "$KEYCHAIN"
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | tr -d '"')
          rm -f "$RUNNER_TEMP/cert.p12"

      - name: Codesign (hardened runtime)
        if: matrix.os == 'macos-latest' && env.APPLE_CERT_P12 != ''
        shell: bash
        run: |
          codesign --force --options runtime --timestamp \
            --entitlements build/darwin/entitlements.plist \
            --sign "$APPLE_DEVELOPER_ID" build/bin/nt.app
          codesign --verify --strict --verbose=2 build/bin/nt.app

      - name: Notarize and staple
        if: matrix.os == 'macos-latest' && env.APPLE_NOTARY_PASSWORD != ''
        # Apple's notary service intermittently accepts a submission then leaves
        # it "In Progress" for hours without returning a verdict (a recurring
        # Apple-side incident, often not even shown on their status page). Cap
        # the step so a stuck submission fails fast instead of running to
        # GitHub's 6h job ceiling (which kills the job and skips Package/Upload).
        timeout-minutes: 25
        shell: bash
        run: |
          ditto -c -k --keepParent build/bin/nt.app "$RUNNER_TEMP/notarize.zip"
          # `notarytool --wait` does a long HTTP poll against Apple's notary
          # service; a transient runner network blip (e.g. NSURLError -1009)
          # mid-poll kills it non-zero and would fail an otherwise-good release.
          # Retry the submit+wait a few times — notarizing identical bits again
          # is cheap and idempotent — before giving up. --timeout bounds each
          # wait so a stuck queue can't hang past the step cap above.
          for attempt in 1 2 3; do
            if xcrun notarytool submit "$RUNNER_TEMP/notarize.zip" \
                 --apple-id "$APPLE_ID" --team-id "$APPLE_TEAM_ID" \
                 --password "$APPLE_NOTARY_PASSWORD" --wait --timeout 10m; then
              break
            fi
            if [ "$attempt" = 3 ]; then
              echo "::error::notarization failed after $attempt attempts" >&2
              exit 1
            fi
            echo "notarytool attempt $attempt failed (likely transient); retrying in $((attempt * 30))s..." >&2
            sleep $((attempt * 30))
          done
          xcrun stapler staple build/bin/nt.app

      # --- Package per platform ---
      - name: Package (macOS)
        if: matrix.os == 'macos-latest'
        shell: bash
        run: ditto -c -k --keepParent build/bin/nt.app "nt-desktop_${VER}_${{ matrix.label }}.zip"

      - name: Package (Linux)
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: tar -C build/bin -czf "nt-desktop_${VER}_${{ matrix.label }}.tar.gz" nt

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: cd build/bin && 7z a "../../nt-desktop_${VER}_${{ matrix.label }}.zip" nt.exe

      - name: Upload to Release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "$RELEASE_TAG" nt-desktop_${VER}_${{ matrix.label }}.* --clobber
