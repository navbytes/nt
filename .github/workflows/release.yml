name: Release

# Push a semver tag to cut a release: GoReleaser builds the cross-platform
# binaries + checksums, creates the GitHub Release, and updates the Homebrew tap.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so GoReleaser can build the changelog
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          # Creates the GitHub Release (binaries + checksums) on this repo.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # When you enable the Homebrew tap later (RELEASING.md), also set:
          # HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
