name: Lint

on:
  push:
    branches: [main]
  pull_request:

jobs:
  golangci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2
          # Don't reuse the action's analysis cache: a stale cache was pinning
          # SA5011 false positives that a fresh run (and local v2.12.2) doesn't
          # report. Re-analyze each run for correct, reproducible results.
          skip-cache: true
