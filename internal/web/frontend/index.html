<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>nt — tasks & notes</title>
    <meta
      name="description"
      content="Tasks & notes as plain text — durable memory your AI agents can't lose."
    />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="icon" href="/favicon-32.png" sizes="32x32" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="theme-color" content="#16161e" />
    <link rel="stylesheet" href="/static/highlight.css" />
    <script>
      // Apply persisted theme before paint to avoid a flash (mirrors v1).
      try {
        var d = document.documentElement,
          t = localStorage.getItem("nt-theme");
        if (t) d.setAttribute("data-theme", t);
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
