<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- nt app mark: a small knowledge graph (nt's hero feature) on a Tokyo Night
       gradient tile. Font-free (pure vectors) so it rasterizes identically
       everywhere. Nodes sit inside the central safe zone so the same art works
       as a maskable icon. -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7aa2f7"/>
      <stop offset="0.55" stop-color="#7c6cf0"/>
      <stop offset="1" stop-color="#bb9af7"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="116" fill="url(#bg)"/>
  <!-- edges -->
  <g stroke="#ffffff" stroke-opacity="0.55" stroke-width="14" stroke-linecap="round">
    <line x1="186" y1="168" x2="342" y2="232"/>
    <line x1="186" y1="168" x2="160" y2="316"/>
    <line x1="160" y1="316" x2="276" y2="372"/>
    <line x1="276" y1="372" x2="342" y2="232"/>
    <line x1="186" y1="168" x2="276" y2="372"/>
  </g>
  <!-- nodes -->
  <g fill="#ffffff">
    <circle cx="186" cy="168" r="40"/>
    <circle cx="342" cy="232" r="30"/>
    <circle cx="160" cy="316" r="26"/>
    <circle cx="276" cy="372" r="34"/>
  </g>
</svg>
