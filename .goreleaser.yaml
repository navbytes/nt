# GoReleaser config — cross-platform release binaries + a Homebrew tap.
# Cut a release: tag the commit (git tag v0.1.0 && git push --tags) then
# `make release` (or `goreleaser release --clean`). Local dry run: `make snapshot`.
version: 2

project_name: nt

before:
  hooks:
    - go mod tidy
    # Build the SPA so the released binary embeds it via //go:embed. The bundle
    # (internal/web/frontend/dist) is generated here, not committed, so this hook
    # is required — without it the release would ship with no web UI.
    - npm --prefix internal/web/frontend ci
    - npm --prefix internal/web/frontend run build

builds:
  - id: nt
    main: .
    binary: nt
    env:
      - CGO_ENABLED=0
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w -X main.version={{ .Version }}

archives:
  - id: nt
    formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    # Windows users expect a .zip; everything else stays .tar.gz.
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: checksums.txt

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

# Homebrew is deferred — day-1 install is the curl script + `go install` +
# release binaries. To enable a tap later: create the navbytes/homebrew-tap repo,
# add the HOMEBREW_TAP_GITHUB_TOKEN secret (RELEASING.md), and uncomment below.
#
# brews:
#   - name: nt
#     repository:
#       owner: navbytes
#       name: homebrew-tap
#       token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
#     homepage: "https://github.com/navbytes/nt"
#     description: "Terminal task & note manager — durable memory for AI coding sessions"
#     license: MIT
