# Generates the SPA's TypeScript types from the Go wire contract (apitypes),
# so the front-end and back-end can't drift. Regenerate with `make web-types`.
packages:
  - path: "github.com/navbytes/nt/internal/web/apitypes"
    output_path: "internal/web/frontend/src/lib/api-types.ts"
    frontmatter: |
      // Code generated by tygo from internal/web/apitypes — DO NOT EDIT.
      // Regenerate with: make web-types
